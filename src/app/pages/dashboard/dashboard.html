<div class="p-6 bg-gray-100 min-h-screen">

    <h1 class="text-3xl font-bold mb-6">Dashboard</h1>

    <div class="grid grid-cols-3 gap-6">

        <div class="bg-green-500 text-white p-6 rounded-2xl shadow">
            <h2>Total Income</h2>
            <p class="text-2xl font-bold">₹ {{ totalIncome }}</p>
        </div>

        <div class="bg-red-500 text-white p-6 rounded-2xl shadow">
            <h2>Total Expense</h2>
            <p class="text-2xl font-bold">₹ {{ totalExpense }}</p>
        </div>

        <div class="bg-blue-500 text-white p-6 rounded-2xl shadow">
            <h2>Balance</h2>
            <p class="text-2xl font-bold">₹ {{ balance }}</p>
        </div>

    </div>

    <button (click)="exportCSV()" class="mt-5 bg-green-600 text-white px-4 py-2 rounded">
        Export Report CSV
    </button>

    <div class="mt-5 grid grid-cols-2 gap-4 bg-white p-6 rounded-2xl shadow">
        <div>
            <h2 class="text-xl font-bold mb-4">Expense Analytics</h2>
            <div style="max-width: 400px; max-height: 400px; margin: 0 auto;">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
        <div>
            <h2 class="text-xl font-bold mb-4">Income Analytics</h2>
            <div style="max-width: 400px; max-height: 400px; margin: 0 auto;">
                <canvas id="incomeChart"></canvas>
            </div>
        </div>
    </div>
    <div class="mt-5 bg-white p-6 rounded-2xl shadow">
        <h2 class="text-xl font-bold mb-4">Budget vs Spending</h2>

        <div *ngFor="let b of budgets" class="mb-4">
            <p class="font-bold">{{ b.category }}</p>
            <p>Budget: ₹{{ b.limit }}</p>
            <p>Spent: ₹{{ getSpent(b.category) }}</p>
        </div>
    </div>

</div>
